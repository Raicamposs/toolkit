name: CI

on: [push, pull_request]

permissions:
  contents: read

env:
  HUSKY: 0

jobs:
  validate-commits:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validar mensagens de commit (Conventional Commits)
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?(!)?: .{1,100}'
          INVALID=0

          get_commits() {
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              git log --format="%s" \
                "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
            elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              git log --format="%s" -1
            else
              git log --format="%s" \
                "${{ github.event.before }}..${{ github.event.after }}"
            fi
          }

          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            if echo "$msg" | grep -qE "$PATTERN"; then
              echo "✅ $msg"
            else
              echo "❌ $msg"
              INVALID=1
            fi
          done < <(get_commits)

          if [ "$INVALID" -ne 0 ]; then
            echo ""
            echo "Mensagens fora do padrão Conventional Commits."
            echo "Formato: <tipo>(<escopo>): <descrição>"
            echo "Tipos:   feat | fix | docs | style | refactor | perf | test | build | ci | chore | revert"
            echo ""
            echo "Use 'npm run commit' para o prompt interativo."
            exit 1
          fi

  test-and-lint:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Verificar Formatação (Prettier)
        run: npm run format:check

      - name: Executar Linter (ESLint)
        run: npm run lint

      - name: Executar Testes (Vitest)
        run: npm test -- --run

      - name: Verificar Compilação (TypeScript)
        run: npm run build

      - name: Validar Empacotamento (Dry-Run)
        run: npm publish --dry-run
